<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Academy: Zero Delay (Mobile)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
        }

        #scene {
            width: 100%; height: 100%;
            background-image: url('background.png'); 
            background-size: cover; background-position: center;
            background-repeat: no-repeat; position: relative; display: block;
            /* ПРАВКА: Сверхмедленное приближение */
            transition: transform 60s linear; 
            transform-origin: center 68%; /* Центрируем зум по часам для мобилок */
        }

        .zoom-active {
            transform: scale(4.5);
        }

        #clock-display {
            position: absolute;
            bottom: 31.3%; left: 49.5%; 
            transform: translateX(-50%) skewX(-2deg);
            width: 60%; height: 9%;    
            display: flex; justify-content: center; align-items: center;
            font-family: 'Arial Narrow', 'Impact', sans-serif; 
            color: #ff0000; font-weight: 900; font-size: 13.5vw; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 1);
            letter-spacing: -3px; white-space: nowrap; opacity: 0.95;
            text-align: center;
        }

        /* ПРАВКА: Минимальное расстояние между строками для мобильной версии */
        .final-code {
            font-size: 7vw !important; /* Уменьшаем размер, чтобы влезло в 2 строки */
            line-height: 0.65 !important;
            letter-spacing: 0px !important;
            white-space: normal !important; /* Разрешаем перенос */
        }

        .active-clock { animation: pulse 0.1s infinite alternate; }

        @keyframes pulse {
            from { opacity: 0.85; text-shadow: 0 0 15px rgba(255, 0, 0, 1); }
            to { opacity: 1; text-shadow: 0 0 25px rgba(255, 0, 0, 1), 0 0 8px white; }
        }

        #noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none; pointer-events: none;
            background: url('https://media.giphy.com/media/oEI9uWU0EB9LpL6SAs/giphy.gif');
            opacity: 0.4;
        }

        #boot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1001;
        }

        #start-btn {
            padding: 15px 30px; background: transparent; color: #ff0000;
            border: 2px solid #ff0000; font-family: 'Impact', sans-serif;
            font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; display: none; 
            justify-content: center; align-items: center;
            z-index: 9999; text-align: center;
        }

        .scary-text {
            color: white; text-transform: uppercase; font-size: 1.8rem; 
            padding: 20px; word-wrap: break-word; max-width: 85%; line-height: 1.1;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="fone.mp3" type="audio/mpeg">
    </audio>

    <div id="noise-overlay"></div>

    <div id="boot-overlay">
        <button id="start-btn">ENABLE SYSTEM CLOCK</button>
    </div>

    <div id="scene">
        <div id="clock-display">
            <div id="clock-text"><span id="c1">-</span><span id="c2">-</span>:<span id="c3">-</span><span id="c4">-</span></div>
        </div>
    </div>

    <div id="overlay">
        <div id="message" class="scary-text"></div>
    </div>

    <script>
        const clockSpans = [
            document.getElementById('c1'), document.getElementById('c2'),
            document.getElementById('c3'), document.getElementById('c4')
        ];
        const clockText = document.getElementById('clock-text');
        const scene = document.getElementById('scene');
        const overlay = document.getElementById('overlay');
        const messageDisplay = document.getElementById('message');
        const audio = document.getElementById('bgMusic');
        const bootOverlay = document.getElementById('boot-overlay');
        const noise = document.getElementById('noise-overlay');
        const clockContainer = document.getElementById('clock-display');
        
        let activeIndices = []; 
        let isCodeTime = false;

        const codeDigitsHtml = "6-9-14-1-12<br>12-9-22-5";
        const codeDigitsPlain = "6-9-14-1-12 12-9-22-5";

        document.getElementById('start-btn').addEventListener('click', () => {
            noise.style.display = 'block';
            
            setTimeout(() => {
                noise.style.display = 'none';
                bootOverlay.style.display = 'none';
                audio.play();

                // Включаем зум
                scene.classList.add('zoom-active');
                
                const order = [0, 2, 1, 3];
                order.forEach((pos, i) => {
                    setTimeout(() => {
                        activeIndices.push(pos);
                        if (activeIndices.length === 4) {
                            clockContainer.classList.add('active-clock');
                        }
                    }, i * 500); 
                });

                // 15 секунда: Код на циферблате
                setTimeout(() => {
                    isCodeTime = true;
                    clockText.classList.add('final-code');
                    clockText.innerHTML = codeDigitsHtml;
                }, 15000);

                // 17 секунда: Чёрный экран
                setTimeout(() => {
                    messageDisplay.innerText = codeDigitsPlain;
                    overlay.style.display = "flex";

                    // Перезагрузка через 3 секунды после чёрного экрана
                    setTimeout(() => {
                        location.reload();
                    }, 3000);
                }, 17000);

            }, 600); 
        });

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        setInterval(() => {
            if (isCodeTime) return;
            activeIndices.forEach(idx => {
                clockSpans[idx].innerText = chars.charAt(Math.floor(Math.random() * chars.length));
            });
        }, 120);

        // Всплывающие фразы удалены
    </script>
</body>
</html>
