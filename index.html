<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Academy: Zero Delay</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
        }

        #scene {
            width: 100%; height: 100%;
            background-image: url('background.png'); 
            background-size: cover; background-position: center;
            background-repeat: no-repeat; position: relative; display: block;
        }

        /* ЦИФЕРБЛАТ — адаптирован под мобильную верстку */
        #clock-display {
            position: absolute;
            bottom: 31.3%; left: 49.5%; 
            transform: translateX(-50%) skewX(-2deg);
            width: 60%; height: 9%;    
            display: flex; justify-content: center; align-items: center;
            font-family: 'Arial Narrow', 'Impact', sans-serif; 
            color: #ff0000; font-weight: 900; font-size: 13.5vw; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 1);
            letter-spacing: -3px; white-space: nowrap; opacity: 0.95;
        }

        .active-clock { animation: pulse 0.1s infinite alternate; }

        @keyframes pulse {
            from { opacity: 0.85; text-shadow: 0 0 15px rgba(255, 0, 0, 1); }
            to { opacity: 1; text-shadow: 0 0 25px rgba(255, 0, 0, 1), 0 0 8px white; }
        }

        /* БЕЛЫЙ ШУМ */
        #noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none; pointer-events: none;
            background: url('https://media.giphy.com/media/oEI9uWU0EB9LpL6SAs/giphy.gif');
            opacity: 0.4;
        }

        /* СТАРТОВЫЙ ЭКРАН */
        #boot-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1001;
        }

        #start-btn {
            padding: 15px 30px; background: transparent; color: #ff0000;
            border: 2px solid #ff0000; font-family: 'Impact', sans-serif;
            font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ЭКРАН СКРИМЕРОВ */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; display: none; 
            justify-content: center; align-items: center;
            z-index: 999; text-align: center;
        }

        .scary-text {
            color: white; text-transform: uppercase; font-size: 2rem; 
            padding: 20px; word-wrap: break-word; max-width: 85%; line-height: 1.1;
        }

        .font-style-0 { font-family: 'Courier New', monospace; color: #ff0000; }
        .font-style-1 { font-family: 'Times New Roman', serif; font-style: italic; }
        .font-style-2 { font-family: 'Arial Black', sans-serif; letter-spacing: -2px; }
        .font-style-3 { font-family: 'Impact', sans-serif; }
        .font-style-4 { font-family: 'Verdana', sans-serif; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="fon.mp3" type="audio/mpeg">
    </audio>

    <div id="noise-overlay"></div>

    <div id="boot-overlay">
        <button id="start-btn">ENABLE SYSTEM CLOCK</button>
    </div>

    <div id="scene">
        <div id="clock-display">
            <span id="c1">-</span><span id="c2">-</span>:<span id="c3">-</span><span id="c4">-</span>
        </div>
    </div>

    <div id="overlay">
        <div id="message" class="scary-text"></div>
    </div>

    <script>
        const clockSpans = [
            document.getElementById('c1'),
            document.getElementById('c2'),
            document.getElementById('c3'),
            document.getElementById('c4')
        ];
        const scene = document.getElementById('scene');
        const overlay = document.getElementById('overlay');
        const messageDisplay = document.getElementById('message');
        const audio = document.getElementById('bgMusic');
        const bootOverlay = document.getElementById('boot-overlay');
        const noise = document.getElementById('noise-overlay');
        const clockContainer = document.getElementById('clock-display');
        
        let isSystemActive = false;
        let activeIndices = []; 

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const phrases = [
            "RUN",
            "you shouldn't be here",
            "it's not what you think",
            "THE ACADEMY IS DANGEROUS",
            "I'm sorry",
            "nz1Tay2nf13fpTGYTpzVfnQ+QGZIDdlMFZ/f9eF5mD9dj8PiAYC4UReMqSkQU9qHupRxUCfnlC5B16pnuGjifg=="
        ];

        document.getElementById('start-btn').addEventListener('click', () => {
            noise.style.display = 'block';
            
            setTimeout(() => {
                noise.style.display = 'none';
                bootOverlay.style.display = 'none';
                audio.play();
                
                // Порядок включения цифр: 1, 3, 2, 4 (индексы: 0, 2, 1, 3)
                const order = [0, 2, 1, 3];
                order.forEach((pos, i) => {
                    setTimeout(() => {
                        activeIndices.push(pos);
                        if (activeIndices.length === 4) {
                            isSystemActive = true;
                            clockContainer.classList.add('active-clock');
                            setTimeout(showScaryEvent, 5000); // Первый скример через 5 сек
                        }
                    }, i * 500); 
                });
            }, 600); 
        });

        // Бегущие символы
        setInterval(() => {
            activeIndices.forEach(idx => {
                clockSpans[idx].innerText = chars.charAt(Math.floor(Math.random() * chars.length));
            });
        }, 120);

        function showScaryEvent() {
            if (!isSystemActive) return;

            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            const randomStyle = "font-style-" + Math.floor(Math.random() * 5);

            messageDisplay.innerText = randomPhrase;
            messageDisplay.className = "scary-text " + randomStyle;
            
            messageDisplay.style.fontSize = (randomPhrase.length > 50) ? "1rem" : "2rem";

            scene.style.display = "none";
            overlay.style.display = "flex";

            setTimeout(() => {
                overlay.style.display = "none";
                scene.style.display = "block";
            }, 5000);
        }

        setInterval(showScaryEvent, 60000);
    </script>
</body>
</html>
