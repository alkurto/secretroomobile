<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Academy: Zero Delay</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }

        #scene {
            width: 100%;
            height: 100%;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: block;
        }

        /* ЦИФЕРБЛАТ — Финальные правки: Крупнее и Левее */
        #clock-display {
            position: absolute;
            bottom: 31.3%; 
            left: 49.5%; 
            transform: translateX(-50%) skewX(-2deg);
            width: 60%;    
            height: 9%;    
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Narrow', 'Impact', sans-serif; 
            color: #ff0000;
            font-weight: 900;
            font-size: 13.5vw; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 1), 0 0 35px rgba(255, 0, 0, 0.8);
            letter-spacing: -3px;
            white-space: nowrap;
            opacity: 0.95;
            animation: pulse 0.1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.85; text-shadow: 0 0 15px rgba(255, 0, 0, 1); }
            to { opacity: 1; text-shadow: 0 0 25px rgba(255, 0, 0, 1), 0 0 8px white; }
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
        }

        .scary-text {
            color: white;
            text-transform: uppercase;
            font-size: 2rem; 
            padding: 20px;
            word-wrap: break-word;
            max-width: 85%;
            line-height: 1.1;
        }

        .font-style-0 { font-family: 'Courier New', monospace; color: #ff0000; }
        .font-style-1 { font-family: 'Times New Roman', serif; font-style: italic; }
        .font-style-2 { font-family: 'Arial Black', sans-serif; letter-spacing: -2px; }
        .font-style-3 { font-family: 'Impact', sans-serif; }
        .font-style-4 { font-family: 'Verdana', sans-serif; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="fon.mp3" type="audio/mpeg">
    </audio>

    <div id="scene">
        <div id="clock-display">88:88</div>
    </div>

    <div id="overlay">
        <div id="message" class="scary-text"></div>
    </div>

    <script>
        const clockDisplay = document.getElementById('clock-display');
        const scene = document.getElementById('scene');
        const overlay = document.getElementById('overlay');
        const messageDisplay = document.getElementById('message');
        const audio = document.getElementById('bgMusic');
        
        // Функция включения музыки при первом клике
        function initAudio() {
            audio.play().catch(e => console.log("Нужен клик для запуска звука"));
            document.removeEventListener('click', initAudio);
        }
        document.addEventListener('click', initAudio);

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const phrases = [
            "RUN",
            "you shouldn't be here",
            "it's not what you think",
            "THE ACADEMY IS DANGEROUS",
            "I'm sorry",
            "nz1Tay2nf13fpTGYTpzVfnQ+QGZIDdlMFZ/f9eF5mD9dj8PiAYC4UReMqSkQU9qHupRxUCfnlC5B16pnuGjifg=="
        ];

        setInterval(() => {
            let res = "";
            for (let i = 0; i < 4; i++) {
                res += chars.charAt(Math.floor(Math.random() * chars.length));
                if (i === 1) res += ":"; 
            }
            clockDisplay.innerText = res;
        }, 120);

        function showScaryEvent() {
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            const randomStyle = "font-style-" + Math.floor(Math.random() * 5);

            messageDisplay.innerText = randomPhrase;
            messageDisplay.style.fontSize = (randomPhrase.length > 50) ? "1rem" : "2rem";
            messageDisplay.className = "scary-text " + randomStyle;
            
            scene.style.display = "none";
            overlay.style.display = "flex";

            setTimeout(() => {
                overlay.style.display = "none";
                scene.style.display = "block";
            }, 5000);
        }

        setInterval(showScaryEvent, 60000);
        setTimeout(showScaryEvent, 5000);
    </script>
</body>
</html>
